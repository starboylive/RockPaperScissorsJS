<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RockPaperScissors</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="main-box">
        <div class="blue">
            <h2 class="heading">Rock - Paper - Scissors</h2>
            <table>
                <thead>
                    <tr>
                        <th>Bot Score</th>
                        <th>Your score</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td id="bot-score">0</td>
                        <td id="player-score">0</td>
                    </tr>
                </tbody>
            </table>

            <ul>
                <li><input type="submit" name="Rock" value="Rock" id="rock" class="action-btn"></li>
                <li><input type="submit" name="Rock" value="Paper" id="paper" class="action-btn"></li>
                <li><input type="submit" name="Rock" value="Scissors" id="scissors" class="action-btn"></li>
            </ul>
        </div>
    </div>


    <script src="index.js"></script>
</body>

</html>
